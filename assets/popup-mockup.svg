<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" viewBox="0 0 620 400" font-family="Segoe UI, Arial, sans-serif">
  <!-- Desktop background -->
  <rect width="620" height="400" fill="#1e1e2e" rx="12"/>

  <!-- Simulated Teams window in background (blurred look) -->
  <rect x="20" y="20" width="580" height="340" fill="#1a1a2e" rx="8" opacity="0.6"/>
  <!-- Teams top bar -->
  <rect x="20" y="20" width="580" height="40" fill="#464775" rx="8"/>
  <rect x="20" y="48" width="580" height="12" fill="#464775"/>
  <!-- Teams logo placeholder -->
  <circle cx="44" cy="40" r="10" fill="#7b83eb"/>
  <text x="44" y="44" text-anchor="middle" font-size="11" fill="white" font-weight="bold">T</text>
  <text x="62" y="44" font-size="13" fill="white" font-weight="600">Microsoft Teams</text>

  <!-- Teams chat area -->
  <rect x="36" y="72" width="564" height="200" fill="#16213e" rx="4"/>
  <!-- Chat messages (blurred/placeholder) -->
  <rect x="50" y="86" width="200" height="12" fill="#464775" rx="6" opacity="0.5"/>
  <rect x="50" y="104" width="310" height="12" fill="#464775" rx="6" opacity="0.4"/>
  <rect x="50" y="122" width="260" height="12" fill="#464775" rx="6" opacity="0.3"/>

  <!-- Message input box with selected text -->
  <rect x="36" y="282" width="564" height="64" fill="#2a2a4a" rx="6" stroke="#7b83eb" stroke-width="1.5"/>
  <!-- Highlighted/selected text in input -->
  <rect x="50" y="296" width="280" height="20" fill="#5865f2" rx="3" opacity="0.5"/>
  <text x="56" y="310" font-size="12" fill="#c0c0e0">i think this are a good idea for the team</text>
  <text x="340" y="310" font-size="11" fill="#888aaa" font-style="italic">  ← selected</text>

  <!-- Hotkey hint -->
  <rect x="460" y="292" width="128" height="22" fill="#3a3a5c" rx="4"/>
  <text x="524" y="307" text-anchor="middle" font-size="10" fill="#9b9bc0">Alt + Shift + G</text>

  <!-- ======= POPUP WINDOW ======= -->
  <!-- Shadow -->
  <rect x="148" y="103" width="330" height="218" rx="10" fill="black" opacity="0.35"/>
  <!-- Popup body -->
  <rect x="144" y="99" width="330" height="218" rx="10" fill="#ffffff"/>
  <!-- Title bar -->
  <rect x="144" y="99" width="330" height="40" rx="10" fill="#5865f2"/>
  <rect x="144" y="119" width="330" height="20" fill="#5865f2"/>
  <!-- Window controls -->
  <circle cx="460" cy="119" r="7" fill="#ff5f57"/>
  <circle cx="441" cy="119" r="7" fill="#febc2e"/>
  <circle cx="422" cy="119" r="7" fill="#28c840"/>
  <!-- Title text -->
  <text x="164" y="124" font-size="13" fill="white" font-weight="600">✦ Grammar Suggestion</text>

  <!-- Divider -->
  <line x1="144" y1="139" x2="474" y2="139" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Original label -->
  <text x="162" y="160" font-size="10" fill="#94a3b8" font-weight="600" letter-spacing="0.5">ORIGINAL</text>
  <!-- Original text box -->
  <rect x="158" y="166" width="294" height="28" fill="#fff1f2" rx="5" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="184" font-size="11.5" fill="#dc2626">i think this are a good idea for the team</text>

  <!-- Arrow -->
  <text x="297" y="214" text-anchor="middle" font-size="16" fill="#5865f2">↓</text>

  <!-- Suggestion label -->
  <text x="162" y="230" font-size="10" fill="#94a3b8" font-weight="600" letter-spacing="0.5">SUGGESTION</text>
  <!-- Suggestion text box -->
  <rect x="158" y="236" width="294" height="28" fill="#f0fdf4" rx="5" stroke="#86efac" stroke-width="1"/>
  <text x="170" y="254" font-size="11.5" fill="#16a34a">I think this is a good idea for the team</text>

  <!-- Buttons -->
  <rect x="162" y="276" width="120" height="30" rx="6" fill="#5865f2"/>
  <text x="222" y="295" text-anchor="middle" font-size="12" fill="white" font-weight="600">✓ Apply</text>

  <rect x="294" y="276" width="120" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="354" y="295" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">✕ Dismiss</text>

  <!-- Label arrow pointing to popup -->
  <line x1="490" y1="200" x2="476" y2="200" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="495" y="196" font-size="10" fill="#f59e0b">Popup UI</text>
  <text x="495" y="208" font-size="10" fill="#f59e0b">(tkinter)</text>
</svg>
